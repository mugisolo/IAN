<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>I-AN Global</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Inter:wght@300;400;500;600&family=Noto+Sans+Arabic:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              // Veranda Palette
              veranda: {
                navy: '#003366',
                silver: '#C0C0C0',
                ivory: '#FFFFF0',
                text: '#1a1a1a'
              },
              // Vault Palette
              vault: {
                mahogany: '#4A2C2C',
                amber: '#FFBF00',
                charcoal: '#36454F',
                paper: '#f5f0e6'
              }
            },
            fontFamily: {
              serif: ['"Cormorant Garamond"', 'serif'],
              sans: ['"Inter"', '"Noto Sans Arabic"', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        font-family: 'Inter', 'Noto Sans Arabic', sans-serif;
      }
      .font-serif {
        font-family: 'Cormorant Garamond', serif;
      }
      /* RTL Support Helpers */
      [dir="rtl"] .font-serif {
        font-family: 'Noto Sans Arabic', sans-serif; /* Arabic doesn't use Garamond well */
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://aistudiocdn.com/react@^19.2.0",
    "react-dom/": "https://aistudiocdn.com/react-dom@^19.2.0/",
    "react/": "https://aistudiocdn.com/react@^19.2.0/",
    "@google/genai": "https://aistudiocdn.com/@google/genai@^1.30.0",
    "lucide-react": "https://aistudiocdn.com/lucide-react@^0.554.0"
  }
}
</script>
</head>
  <body>
    <div id="root"></div>
  </body>
</html>
